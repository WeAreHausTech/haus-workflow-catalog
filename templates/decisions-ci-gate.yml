# Paste into `.github/workflows/ci.yml` after installing `@haus-tech/haus-workflow` in CI.
#
# Optional lefthook pre-commit (merge into lefthook.yml):
#   decisions-check:
#     run: haus decisions check --staged
#     fail_text: 'Staged change needs an ADR. Run `haus decisions suggest`.'

decisions-gate:
  if: github.event_name == 'pull_request'
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install haus CLI
      run: npm install -g @haus-tech/haus-workflow@latest
    - name: Require ADR for decision-worthy changes
      run: haus decisions check --range origin/${{ github.base_ref }}..HEAD
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
