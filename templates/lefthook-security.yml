# Lefthook security pre-commit — commit-time secret scanning for haus projects.
#
# Complements haus's runtime PreToolUse guards + settings.json permissions.deny
# (which gate the agent in real time) with a commit-time net. Copy to the repo
# root as `lefthook.yml` (or merge into an existing one), then run `lefthook install`.
#
# gitleaks is optional but recommended (https://github.com/gitleaks/gitleaks#installing):
# when present it does the heavy lifting; the grep baseline below always runs.
pre-commit:
  parallel: true
  commands:
    gitleaks:
      # Runs only when gitleaks is installed — a missing binary never fails the commit.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        fi
      fail_text: 'gitleaks found a likely secret in staged changes. Remove it, re-stage, and commit. Install gitleaks: https://github.com/gitleaks/gitleaks#installing'
    secret-grep:
      # Always-on baseline. Scans ADDED lines only (ignores removed lines, so
      # deleting a leaked secret is never blocked) for inline credential assignments.
      run: |
        added="$(git diff --cached --no-color -U0 | grep -E '^\+' | grep -vE '^\+\+\+')"
        if printf '%s\n' "$added" | grep -iqE "(password|secret|token|api_key)[[:space:]]*[:=]"; then
          exit 1
        fi
      fail_text: 'A staged line looks like an inline credential (password/secret/token/api_key). Move it to an environment variable or secret manager, then re-stage.'
