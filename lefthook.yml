# Lefthook git hooks for haus-workflow-catalog.
#
# Fast local feedback before the CI round-trip, and dogfooding the Lefthook
# standard the catalog ships. CI (validate.yml) remains the correctness floor.
#
# Installed via the `prepare` script (`lefthook install`).

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        fi
      fail_text: 'gitleaks found a likely secret in staged changes.'
    secret-grep:
      run: |
        added="$(git diff --cached --no-color -U0 -- ':!.github/workflows' | grep -E '^\+' | grep -vE '^\+\+\+')"
        if printf '%s\n' "$added" | grep -iqE "(password|secret|token|api_key)[[:space:]]*[:=]"; then
          exit 1
        fi
      fail_text: 'A staged line looks like an inline credential.'
    validate:
      run: yarn validate
      fail_text: 'Catalog validation failed. Run `yarn validate` to see the errors (manifest schema, version bumps, banned tags/phrases), fix them, then commit.'
    format:
      glob: '*.{json,md,mjs,yml,yaml}'
      run: yarn prettier --write {staged_files}
      stage_fixed: true
      fail_text: 'Prettier could not format a staged file. Fix the syntax error it reports, re-stage, then commit.'
    lint:
      glob: '{scripts,tests}/**/*.mjs'
      run: yarn eslint {staged_files}
      fail_text: 'Lint failed. Run `yarn lint` to see details, fix, re-stage, then commit.'

pre-push:
  commands:
    test:
      run: yarn test
      fail_text: 'Tests failed. Run `yarn test`, fix the failures, then push.'
