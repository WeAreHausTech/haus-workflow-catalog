version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        patterns:
          - '*'
    ignore:
      # Major bumps: deliberate upgrade, not auto-PR.
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
      # Unfixable transitive advisories: add dependency-name here after triage
      # (e.g. fixed via yarn resolutions). Stops repeat failed security PRs.
