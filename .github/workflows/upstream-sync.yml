name: Upstream catalog sync

# Weekly sync of upstream catalog items from every source in sources.yaml:
# scripts/sync-upstream.mjs clones each upstream HEAD, diffs the local catalog against
# that snapshot, and on --apply re-copies drifted files + updates sources.yaml.

on:
  schedule:
    # Sundays at 06:00 UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: upstream-catalog-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials: false — required so create-pull-request pushes with
      # github.token, not the workflow_dispatch actor's cached credentials.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Sync upstream catalog sources
        run: node scripts/sync-upstream.mjs --apply

      # manifest.json, sources.yaml, etc. — catalog item trees are in .prettierignore.
      - name: Format haus-owned files
        run: yarn format

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate catalog
        if: steps.diff.outputs.changed == 'true'
        run: yarn validate

      - name: Open or update sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: chore/upstream-catalog-sync
          delete-branch: false
          commit-message: 'chore(catalog): sync upstream sources'
          title: 'chore(catalog): sync upstream sources'
          body: |
            Automated sync of curated catalog items from the sources in `sources.yaml`:

            - skills + commands from [pcvelz/superpowers](https://github.com/pcvelz/superpowers) (mirror)
            - agents from [affaan-m/ECC](https://github.com/affaan-m/ECC) and
              [yeachan-heo/oh-my-claudecode](https://github.com/yeachan-heo/oh-my-claudecode) (select)

            See workflow run summary for the sync report from `scripts/sync-upstream.mjs`.
