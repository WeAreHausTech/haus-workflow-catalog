name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.24.2
        run: |
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${BASE}/${ARCHIVE}" -o /tmp/gitleaks.tar.gz
          curl -sSfL "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          grep "${ARCHIVE}" /tmp/gitleaks_checksums.txt | sha256sum --check
          tar -xz -C /usr/local/bin gitleaks < /tmp/gitleaks.tar.gz
          rm /tmp/gitleaks.tar.gz /tmp/gitleaks_checksums.txt
          gitleaks version

      - name: Detect secrets
        run: gitleaks detect --source . --verbose --redact

      - name: Test
        run: yarn test

      - name: Verify manifest version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/check-manifest-version.mjs "$VERSION"

      - name: Validate catalog
        run: node scripts/validate.mjs ./manifest.json

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -60)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: manifest.json
          fail_on_unmatched_files: true
          make_latest: true
