name: Validate catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install @haus-tech/haus-workflow
        run: npm install -g @haus-tech/haus-workflow

      - name: Validate catalog manifest
        run: haus validate-catalog ./manifest.json
