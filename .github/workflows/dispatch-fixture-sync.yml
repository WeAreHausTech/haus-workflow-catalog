name: Dispatch fixture sync

concurrency:
  group: dispatch-fixture-sync
  cancel-in-progress: true

permissions: {}

# Fires on catalog release tags as a **backup** path to trigger
# `sync-catalog-fixture` in WeAreHausTech/haus-workflow.
#
# Primary fixture sync: `haus-workflow` workflow `sync-catalog-from-release`
# (weekly cron + manual) — no PAT required in this repo.
#
# Optional secret: HAUS_WORKFLOW_DISPATCH_TOKEN
#   A fine-grained PAT scoped to WeAreHausTech/haus-workflow with
#   the `contents: write` permission (fine-grained) or `repo` scope (classic).
#   Add it under this repo's Settings → Secrets → Actions,
#   or as an org-level secret shared to both repos.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-catalog-fixture in haus-workflow
        env:
          DISPATCH_TOKEN: ${{ secrets.HAUS_WORKFLOW_DISPATCH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "::warning::HAUS_WORKFLOW_DISPATCH_TOKEN is not set — skipping backup dispatch." \
                 "Primary fixture sync runs in haus-workflow via sync-catalog-from-release."
            exit 0
          fi

          payload=$(printf '{"event_type":"sync-catalog-fixture","client_payload":{"sha":"%s","ref":"%s"}}' \
            "${GITHUB_SHA}" "${GITHUB_REF_NAME}")

          # Capture the HTTP status separately; a repository_dispatch success is 204.
          # Without this, curl exits 0 even on 401/404 and the sync silently never fires.
          status=$(curl -sS -L \
            -o /tmp/dispatch-response.txt \
            -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/WeAreHausTech/haus-workflow/dispatches \
            -d "${payload}")

          echo "repository_dispatch responded with HTTP ${status}"
          if [ "${status}" != "204" ]; then
            echo "::error::Failed to dispatch sync-catalog-fixture (HTTP ${status}). " \
                 "Response body:"
            cat /tmp/dispatch-response.txt || true
            exit 1
          fi
          echo "sync-catalog-fixture dispatched successfully."
