name: Dispatch fixture sync

# Fires whenever manifest.json or validation-rules.json lands on main, triggering
# the sync-catalog-fixture workflow in WeAreHausTech/haus-workflow so its test
# fixtures stay in sync with the published catalog.
#
# Required secret: HAUS_WORKFLOW_DISPATCH_TOKEN
#   A fine-grained PAT scoped to WeAreHausTech/haus-workflow with
#   the `contents: write` permission (fine-grained) or `repo` scope (classic).
#   Add it under this repo's Settings → Secrets → Actions,
#   or as an org-level secret shared to both repos.

on:
  push:
    branches: [main]
    paths:
      - manifest.json
      - validation-rules.json

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-catalog-fixture in haus-workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HAUS_WORKFLOW_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/WeAreHausTech/haus-workflow/dispatches \
            -d '{
              "event_type": "sync-catalog-fixture",
              "client_payload": {
                "sha": "${{ github.sha }}",
                "ref": "${{ github.ref_name }}"
              }
            }'
